<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MZJ Marketing System - تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card workspace-card">
      <span class="eyebrow">MZJ Workspace</span>
      <h1>تسجيل الدخول</h1>
      <p>ادخل بحسابك الفعلي الموجود في مسار user داخل Firestore. لو الحساب القديم مفيهوش password استخدم 123456.</p>
      <form id="loginForm" class="login-form">
        <label class="mzj-field"><span>الإيميل</span><input id="loginEmail" type="email" required placeholder="email@domain.com"></label>
        <label class="mzj-field"><span>كلمة المرور</span><input id="loginPassword" type="password" required placeholder="123456"></label>
        <button class="primary-btn" type="submit">دخول</button>
        <p id="loginMessage" class="admin-only-note"></p>
      </form>
      <div class="login-credentials">
        <strong>الدخول من مسار users</strong>
        <span>السيستم بيبحث أولاً في Firestore collection: users.</span>
        <span>لو اليوزر القديم مفيهوش حقل password، كلمة المرور الافتراضية: 123456.</span>
      </div>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="routes.js"></script>
  <script src="auth.js"></script>
</body>
</html>
